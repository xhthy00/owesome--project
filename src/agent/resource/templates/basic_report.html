<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{REPORT_TITLE}}</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f7fb; margin: 0; }
    .wrap { max-width: 920px; margin: 24px auto; padding: 0 16px; }
    .card { background: #fff; border-radius: 12px; border: 1px solid #e4e7ec; padding: 20px 24px; margin-bottom: 16px; }
    h1 { margin: 0 0 8px; font-size: 24px; }
    .sub { margin: 0; color: #667085; font-size: 14px; }
    .section-title { margin: 0 0 12px; font-size: 18px; color: #344054; }
    .muted { color: #667085; font-size: 13px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>{{REPORT_TITLE}}</h1>
      <p class="sub">{{REPORT_SUBTITLE}}</p>
    </div>
    <div class="card">
      <h2 class="section-title">{{SECTION_1_TITLE}}</h2>
      <div>{{SECTION_1_CONTENT}}</div>
    </div>
    <div class="card">
      <h2 class="section-title">{{SECTION_2_TITLE}}</h2>
      <div>{{SECTION_2_CONTENT}}</div>
    </div>
    <div class="card muted">Generated by awesome-project agent</div>
  </div>
</body>
</html>
